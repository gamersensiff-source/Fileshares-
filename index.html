<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENSIX Vault — Shared Files</title>
<meta name="description" content="Download shared files instantly.">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <span class="brand-mark">SX</span>
        <span class="brand-name">SENSIX <strong>Vault</strong></span>
      </div>
      <nav>
        <a href="#files" class="nav-link">All Files</a>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="container hero-inner">
      <span class="eyebrow">Shared File Hub</span>
      <h1>Grab the files you need, instantly.</h1>
      <p class="hero-sub">
        Every file listed below is ready to download with a single click. No sign-up, no waiting — just click and go.
      </p>
      <a href="#files" class="btn btn-primary">View All Files</a>
    </div>
  </section>

  <!-- FILES SECTION -->
  <section id="files" class="files-section">
    <div class="container">
      <div class="section-heading">
        <h2>All Files</h2>
        <p id="file-count" class="file-count">Loading files…</p>
      </div>

      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search files…" autocomplete="off">
      </div>

      <div id="fileGrid" class="file-grid">
        <!-- Files injected here by script.js -->
      </div>

      <p id="emptyState" class="empty-state" hidden>No files found.</p>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span id="year"></span> SENSIX Vault. All files served as-is.</p>
    </div>
  </footer>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script src="script.js"></script>
</body>
</html>
