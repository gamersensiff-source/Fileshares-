<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENSIX Vault — Admin Review</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="admin.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <span class="brand-mark">SX</span>
        <span class="brand-name">SENSIX <strong>Vault</strong></span>
        <span class="admin-tag">Admin</span>
      </div>
      <nav>
        <a href="index.html" class="nav-link">← Back to Site</a>
      </nav>
    </div>
  </header>

  <!-- LOGIN GATE -->
  <section id="loginGate" class="admin-login-section">
    <div class="container">
      <div class="admin-login-box">
        <h2>🔒 Admin Login</h2>
        <p class="section-sub">Enter the admin password to review submissions</p>
        <input type="password" id="adminPasswordInput" placeholder="Password" autocomplete="off">
        <button id="loginBtn" class="btn btn-primary">Unlock</button>
        <p id="loginError" class="admin-error" hidden>❌ Wrong password</p>
      </div>
    </div>
  </section>

  <!-- ADMIN DASHBOARD (hidden until unlocked) -->
  <section id="adminDashboard" class="admin-dashboard" hidden>
    <div class="container">

      <div class="section-heading">
        <h2>Pending Submissions</h2>
        <span id="pendingCount" class="file-count">0 pending</span>
      </div>

      <div id="pendingList" class="admin-list"></div>
      <p id="pendingEmpty" class="empty-state" hidden>🎉 No pending submissions.</p>

      <div class="section-heading" style="margin-top:48px;">
        <h2>Approved Files</h2>
        <span id="approvedCount" class="file-count">0 approved</span>
      </div>

      <div id="approvedList" class="admin-list"></div>
      <p id="approvedEmpty" class="empty-state" hidden>No approved files yet.</p>

    </div>
  </section>

  <div id="toast" class="toast"></div>

  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
